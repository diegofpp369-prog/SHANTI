<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galería · Shanti Ibarra</title>
<meta name="description" content="Momentos en Shanti Ibarra: yoga, brunch consciente, talleres, ceremonias y la naturaleza de Imbabura, Ecuador.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}html{scroll-behavior:smooth;}
  body{margin:0;background:#FAF6F1;color:#33322E;font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:#2F6E6A;}a:hover{color:#245A57;}
</style>
<script src="./image-slot.js"></script>
</helmet>
<div style="background:#FAF6F1;overflow-x:hidden">
<dc-import name="Nav" page="galeria" hint-size="100%,74px"></dc-import>

<section style="background:#F1E6E1;padding:clamp(64px,9vw,110px) clamp(22px,6vw,64px);text-align:center;position:relative;overflow:hidden">
  <svg viewBox="0 0 120 120" width="200" height="200" style="position:absolute;left:-44px;top:-40px;opacity:.1;color:#C98A8C" fill="none" stroke="currentColor" stroke-width="1"><path d="M60 118C60 82 42 66 20 62 44 58 60 40 60 4 60 40 76 58 100 62 78 66 60 82 60 118Z"/></svg>
  <p style="font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C98A8C;margin:0 0 16px;font-weight:500;position:relative">{{ c.kicker }}</p>
  <h1 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(40px,6.5vw,78px);line-height:1.02;margin:0 0 18px;color:#2b3a36;position:relative">{{ c.title }}</h1>
  <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(19px,2.6vw,26px);color:#8a6f68;margin:0 auto;max-width:560px;position:relative">{{ c.sub }}</p>
</section>

<section style="max-width:1180px;margin:0 auto;padding:clamp(56px,8vw,96px) clamp(22px,6vw,64px)">
  <div style="column-width:290px;column-gap:16px">
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease,transform .8s ease;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;cursor:zoom-in" onClick="{{ openHero }}"><img src="assets/hero.jpg" alt="Amanecer y meditación en Shanti" style="width:100%;display:block" style-hover="transform:scale(1.04)"></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease .05s,transform .8s ease .05s;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:3/4;position:relative"><image-slot id="gal-brunch" shape="rect" placeholder="Brunch consciente"></image-slot></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;cursor:zoom-in" onClick="{{ openGroup }}"><img src="assets/group-yoga.jpg" alt="Clase de yoga en grupo" style="width:100%;display:block" style-hover="transform:scale(1.04)"></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease .05s,transform .8s ease .05s;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:1/1;position:relative"><image-slot id="gal-nature" shape="rect" placeholder="Naturaleza de Imbabura"></image-slot></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;cursor:zoom-in" onClick="{{ openChave }}"><img src="assets/chave.jpg" alt="Chave, fundadora de Shanti" style="width:100%;display:block" style-hover="transform:scale(1.04)"></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease .05s,transform .8s ease .05s;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:4/5;position:relative"><image-slot id="gal-taller" shape="rect" placeholder="Taller de mujeres"></image-slot></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:3/4;position:relative"><image-slot id="gal-ceremonia" shape="rect" placeholder="Ceremonia"></image-slot></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease .05s,transform .8s ease .05s;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:1/1;position:relative"><image-slot id="gal-comunidad" shape="rect" placeholder="Comunidad"></image-slot></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:4/5;position:relative"><image-slot id="gal-flores" shape="rect" placeholder="Flores y detalles"></image-slot></div>
    <div data-reveal style="opacity:0;transform:translateY(20px);transition:opacity .8s ease .05s,transform .8s ease .05s;break-inside:avoid;margin-bottom:16px;border-radius:8px;overflow:hidden;aspect-ratio:3/4;position:relative"><image-slot id="gal-espacio" shape="rect" placeholder="El espacio"></image-slot></div>
  </div>
  <p style="text-align:center;font-size:13px;color:#a8a69e;margin:26px auto 0;max-width:520px;font-weight:300">{{ c.slotNote }}</p>
</section>

<section style="background:#fff;padding:clamp(56px,8vw,90px) clamp(22px,6vw,64px);text-align:center">
  <div style="max-width:560px;margin:0 auto">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#C98A8C" stroke-width="1.4" style="margin-bottom:18px"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#C98A8C" stroke="none"/></svg>
    <h2 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(28px,3.8vw,42px);margin:0 0 14px;color:#2b3a36">{{ c.igTitle }}</h2>
    <p style="font-size:16px;line-height:1.7;font-weight:300;color:#6b6960;margin:0 0 26px">{{ c.igText }}</p>
    <a href="https://instagram.com/shanti.ibarra" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:9px;background:none;border:1px solid #2F6E6A;color:#2F6E6A;text-decoration:none;padding:14px 30px;border-radius:999px;font-size:14px;letter-spacing:.05em" style-hover="background:#2F6E6A;color:#fff">@shanti.ibarra →</a>
  </div>
</section>

<sc-if value="{{ lightbox }}" hint-placeholder-val="{{ false }}">
  <div onClick="{{ closeLightbox }}" style="position:fixed;inset:0;z-index:2000;background:rgba(30,40,37,.92);display:flex;align-items:center;justify-content:center;padding:30px;cursor:zoom-out">
    <img src="{{ lightbox }}" alt="" style="max-width:92%;max-height:90%;border-radius:6px;box-shadow:0 30px 80px rgba(0,0,0,.5)">
    <button onClick="{{ closeLightbox }}" aria-label="close" style="position:absolute;top:24px;right:28px;background:rgba(255,255,255,.14);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;line-height:1">×</button>
  </div>
</sc-if>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { lightbox: null };
  componentDidMount() { this.setupReveal(); }
  componentWillUnmount() { clearTimeout(this._f); if (this._io) this._io.disconnect(); }
  setupReveal() {
    const els = Array.from(document.querySelectorAll('[data-reveal]'));
    const show = el => { el.style.opacity = '1'; el.style.transform = 'none'; };
    if (!('IntersectionObserver' in window)) { els.forEach(show); return; }
    this._io = new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting) { show(e.target); this._io.unobserve(e.target); } }), { threshold: 0.05, rootMargin: '0px 0px -4% 0px' });
    els.forEach(el => this._io.observe(el));
    this._f = setTimeout(() => els.forEach(show), 2600);
  }
  open(src) { this.setState({ lightbox: src }); }
  renderVals() {
    const lang = (typeof localStorage !== 'undefined' && localStorage.getItem('shanti_lang')) || 'es';
    const es = lang === 'es';
    const c = es ? {
      kicker: 'Galería', title: 'Momentos en Shanti', sub: 'Instantes de calma, comunidad y naturaleza.',
      slotNote: 'Este es el espacio para las fotos de Shanti. Arrastra tus imágenes para llenar la galería con tus propios momentos.',
      igTitle: 'Síguenos en Instagram', igText: 'Vive el día a día de Shanti, nuestras clases, brunchs y encuentros en @shanti.ibarra.'
    } : {
      kicker: 'Gallery', title: 'Moments at Shanti', sub: 'Instants of calm, community and nature.',
      slotNote: 'This is the space for Shanti\u2019s photos. Drag your own images in to fill the gallery with your moments.',
      igTitle: 'Follow us on Instagram', igText: 'Live the everyday of Shanti — our classes, brunches and gatherings — at @shanti.ibarra.'
    };
    return {
      c, lightbox: this.state.lightbox,
      openHero: () => this.open('assets/hero.jpg'),
      openGroup: () => this.open('assets/group-yoga.jpg'),
      openChave: () => this.open('assets/chave.jpg'),
      closeLightbox: () => this.setState({ lightbox: null })
    };
  }
}
</script>
</body>
</html>
