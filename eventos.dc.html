<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eventos & Agenda · Shanti Ibarra</title>
<meta name="description" content="Agenda de yoga, brunch, talleres, ceremonias y retiros en Shanti Ibarra. Reserva tu lugar entre las montañas de Imbabura.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}html{scroll-behavior:smooth;}
  body{margin:0;background:#FAF6F1;color:#33322E;font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:#2F6E6A;}a:hover{color:#245A57;}
  input,select,textarea{font-family:'Jost',sans-serif;}
  input::placeholder,textarea::placeholder{color:#a8a69e;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#2F6E6A !important;}
</style>
</helmet>
<div style="background:#FAF6F1;overflow-x:hidden">
<dc-import name="Nav" page="eventos" hint-size="100%,74px"></dc-import>

<section style="background:#F1E6E1;padding:clamp(64px,9vw,110px) clamp(22px,6vw,64px);text-align:center;position:relative;overflow:hidden">
  <svg viewBox="0 0 120 120" width="200" height="200" style="position:absolute;right:-44px;top:-40px;opacity:.1;color:#C98A8C" fill="none" stroke="currentColor" stroke-width="1"><path d="M60 118C60 82 42 66 20 62 44 58 60 40 60 4 60 40 76 58 100 62 78 66 60 82 60 118Z"/></svg>
  <p style="font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C98A8C;margin:0 0 16px;font-weight:500;position:relative">{{ c.kicker }}</p>
  <h1 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(40px,6.5vw,78px);line-height:1.02;margin:0 0 18px;color:#2b3a36;position:relative">{{ c.title }}</h1>
  <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(19px,2.6vw,26px);color:#8a6f68;margin:0 auto;max-width:560px;position:relative">{{ c.sub }}</p>
</section>

<!-- EVENTS LIST -->
<section style="max-width:920px;margin:0 auto;padding:clamp(60px,9vw,110px) clamp(22px,6vw,64px) clamp(50px,7vw,80px)">
  <div style="display:flex;flex-direction:column;gap:20px">
    <sc-for list="{{ events }}" as="ev" hint-placeholder-count="5">
      <div data-reveal style="opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;background:#fff;border:1px solid rgba(51,50,46,.08);border-radius:10px;padding:26px clamp(22px,3vw,34px);display:flex;gap:clamp(18px,3vw,30px);align-items:center;flex-wrap:wrap" style-hover="border-color:#C9A9A1;box-shadow:0 18px 40px -26px rgba(47,110,106,.4)">
        <div style="text-align:center;background:#F1E6E1;border-radius:8px;padding:14px 16px;min-width:80px">
          <div style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;line-height:.95;color:#2b3a36">{{ ev.day }}</div>
          <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a6f68;margin-top:3px">{{ ev.month }}</div>
        </div>
        <div style="flex:1;min-width:200px">
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:7px">
            <span style="font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#2F6E6A;background:rgba(47,110,106,.1);padding:4px 10px;border-radius:999px">{{ ev.tag }}</span>
            <span style="font-size:12.5px;color:#8a8880">{{ ev.time }}</span>
          </div>
          <h3 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#2b3a36;margin:0 0 6px;line-height:1.1">{{ ev.title }}</h3>
          <p style="font-size:14.5px;line-height:1.6;font-weight:300;color:#6b6960;margin:0">{{ ev.desc }}</p>
        </div>
        <a href="{{ ev.wa }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;background:#2F6E6A;color:#fff;text-decoration:none;padding:12px 24px;border-radius:999px;font-size:13px;letter-spacing:.05em;white-space:nowrap" style-hover="background:#245A57">{{ c.reserve }}</a>
      </div>
    </sc-for>
  </div>
</section>

<!-- BOOKING FORM -->
<section id="reservar" style="background:#fff;padding:clamp(60px,9vw,110px) clamp(22px,6vw,64px);scroll-margin-top:84px">
  <div style="max-width:1080px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(40px,6vw,72px);align-items:center">
    <div data-reveal style="opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease">
      <p style="font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#C98A8C;margin:0 0 16px;font-weight:500">{{ c.formKicker }}</p>
      <h2 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(32px,4.4vw,50px);line-height:1.06;margin:0 0 20px;color:#2b3a36">{{ c.formTitle }}</h2>
      <p style="font-size:16.5px;line-height:1.8;font-weight:300;color:#5c5a53;margin:0 0 28px">{{ c.formText }}</p>
      <div style="display:flex;flex-direction:column;gap:14px;font-size:14.5px;color:#5c5a53">
        <div style="display:flex;gap:11px;align-items:center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2F6E6A" stroke-width="1.4"><path d="M4 5c0 8.3 6.7 15 15 15a2 2 0 0 0 2-2v-2.5a1 1 0 0 0-.8-1l-3.3-.7a1 1 0 0 0-1 .4l-.8 1a12 12 0 0 1-5-5l1-.8a1 1 0 0 0 .4-1L10 5.8A1 1 0 0 0 9 5H6.5A2 2 0 0 0 4 5Z"/></svg> 098 870 6699</div>
        <div style="display:flex;gap:11px;align-items:center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2F6E6A" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg> info@shantiibarra.com</div>
      </div>
    </div>
    <div data-reveal style="opacity:0;transform:translateY(24px);transition:opacity .9s ease .1s,transform .9s ease .1s;background:#FAF6F1;border:1px solid rgba(51,50,46,.08);border-radius:14px;padding:clamp(26px,4vw,40px)">
      <div style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:7px">{{ c.fName }}</label>
          <input type="text" value="{{ form.name }}" onInput="{{ onName }}" placeholder="{{ c.phName }}" style="width:100%;padding:13px 15px;border:1px solid rgba(51,50,46,.16);border-radius:8px;background:#fff;font-size:15px;color:#33322E">
        </div>
        <div>
          <label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:7px">{{ c.fExp }}</label>
          <select value="{{ form.exp }}" onChange="{{ onExp }}" style="width:100%;padding:13px 15px;border:1px solid rgba(51,50,46,.16);border-radius:8px;background:#fff;font-size:15px;color:#33322E;appearance:none">
            <sc-for list="{{ expOptions }}" as="op" hint-placeholder-count="6"><option value="{{ op }}">{{ op }}</option></sc-for>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div>
            <label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:7px">{{ c.fDate }}</label>
            <input type="date" value="{{ form.date }}" onInput="{{ onDate }}" style="width:100%;padding:13px 15px;border:1px solid rgba(51,50,46,.16);border-radius:8px;background:#fff;font-size:15px;color:#33322E">
          </div>
          <div>
            <label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:7px">{{ c.fPeople }}</label>
            <input type="number" min="1" value="{{ form.people }}" onInput="{{ onPeople }}" style="width:100%;padding:13px 15px;border:1px solid rgba(51,50,46,.16);border-radius:8px;background:#fff;font-size:15px;color:#33322E">
          </div>
        </div>
        <div>
          <label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:7px">{{ c.fMsg }}</label>
          <textarea rows="3" value="{{ form.msg }}" onInput="{{ onMsg }}" placeholder="{{ c.phMsg }}" style="width:100%;padding:13px 15px;border:1px solid rgba(51,50,46,.16);border-radius:8px;background:#fff;font-size:15px;color:#33322E;resize:vertical"></textarea>
        </div>
        <button onClick="{{ submit }}" style="display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#2F6E6A;color:#fff;border:none;padding:15px;border-radius:999px;font-size:14.5px;letter-spacing:.05em;cursor:pointer;font-family:'Jost',sans-serif" style-hover="background:#245A57">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.4 1.3 4.9L2 22l5.3-1.4c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.3c-1.5 0-3-.4-4.2-1.2l-.3-.2-3.1.8.8-3-.2-.3C4 15.2 3.6 13.6 3.6 12 3.6 7.4 7.4 3.7 12 3.7c4.6 0 8.3 3.7 8.3 8.3S16.6 20.3 12 20.3z"/></svg>
          {{ c.fSubmit }}
        </button>
        <p style="font-size:12px;color:#a8a69e;text-align:center;margin:0">{{ c.formNote }}</p>
      </div>
    </div>
  </div>
</section>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { form: { name: '', exp: '', date: '', people: '2', msg: '' } };
  componentDidMount() { this.setupReveal(); }
  componentWillUnmount() { clearTimeout(this._f); if (this._io) this._io.disconnect(); }
  setupReveal() {
    const els = Array.from(document.querySelectorAll('[data-reveal]'));
    const show = el => { el.style.opacity = '1'; el.style.transform = 'none'; };
    if (!('IntersectionObserver' in window)) { els.forEach(show); return; }
    this._io = new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting) { show(e.target); this._io.unobserve(e.target); } }), { threshold: 0.08, rootMargin: '0px 0px -5% 0px' });
    els.forEach(el => this._io.observe(el));
    this._f = setTimeout(() => els.forEach(show), 2400);
  }
  set(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v } })); }
  submit = () => {
    const lang = (localStorage.getItem('shanti_lang') || 'es');
    const f = this.state.form;
    const exp = f.exp || (lang === 'es' ? 'una experiencia' : 'an experience');
    let msg;
    if (lang === 'es') {
      msg = `Hola Shanti 🌿 Soy ${f.name || '(nombre)'}. Me gustaría reservar: ${exp}`;
      if (f.date) msg += ` para el ${f.date}`;
      if (f.people) msg += `, ${f.people} persona(s)`;
      msg += '.';
      if (f.msg) msg += ` ${f.msg}`;
    } else {
      msg = `Hi Shanti 🌿 I'm ${f.name || '(name)'}. I'd like to book: ${exp}`;
      if (f.date) msg += ` on ${f.date}`;
      if (f.people) msg += `, ${f.people} person(s)`;
      msg += '.';
      if (f.msg) msg += ` ${f.msg}`;
    }
    window.open('https://wa.me/593988706699?text=' + encodeURIComponent(msg), '_blank');
  };
  renderVals() {
    const lang = (typeof localStorage !== 'undefined' && localStorage.getItem('shanti_lang')) || 'es';
    const es = lang === 'es';
    const wa = (t) => 'https://wa.me/593988706699?text=' + encodeURIComponent(t);
    const events = es ? [
      { day: '02', month: 'Ago', tag: 'Cada domingo', time: '08:00', title: 'Yoga & Brunch Dominical', desc: 'Práctica suave al amanecer y brunch consciente para empezar la semana en calma.', wa: wa('Hola Shanti 🌿 Quiero reservar el Yoga & Brunch Dominical.') },
      { day: '16', month: 'Ago', tag: 'Solo mujeres', time: '16:00', title: 'Círculo de Mujeres', desc: 'Un taller para reconectar, compartir y sostenernos en comunidad.', wa: wa('Hola Shanti 🌿 Quiero reservar el Círculo de Mujeres.') },
      { day: '30', month: 'Ago', tag: 'Luna llena', time: '18:30', title: 'Ceremonia de Luna Llena', desc: 'Ritual de cacao para cerrar ciclos y honrar tu proceso bajo el cielo de Ibarra.', wa: wa('Hola Shanti 🌿 Quiero reservar la Ceremonia de Luna Llena.') },
      { day: '06', month: 'Sep', tag: 'Taller', time: '10:00', title: 'Respiración Consciente', desc: 'Aprende a usar la respiración como una herramienta para calmar la mente.', wa: wa('Hola Shanti 🌿 Quiero reservar el taller de Respiración Consciente.') },
      { day: '20', month: 'Sep', tag: 'Retiro', time: '2 días', title: 'Retiro de Fin de Semana', desc: 'Dos días de yoga, naturaleza y descanso para volver a ti sin prisa.', wa: wa('Hola Shanti 🌿 Quiero información del Retiro de Fin de Semana.') }
    ] : [
      { day: '02', month: 'Aug', tag: 'Every Sunday', time: '08:00', title: 'Sunday Yoga & Brunch', desc: 'A gentle sunrise practice and conscious brunch to begin the week in calm.', wa: wa('Hi Shanti 🌿 I want to book the Sunday Yoga & Brunch.') },
      { day: '16', month: 'Aug', tag: 'Women only', time: '16:00', title: "Women's Circle", desc: 'A workshop to reconnect, share and hold one another in community.', wa: wa("Hi Shanti 🌿 I want to book the Women's Circle.") },
      { day: '30', month: 'Aug', tag: 'Full moon', time: '18:30', title: 'Full Moon Ceremony', desc: 'A cacao ritual to close cycles and honour your process under the Ibarra sky.', wa: wa('Hi Shanti 🌿 I want to book the Full Moon Ceremony.') },
      { day: '06', month: 'Sep', tag: 'Workshop', time: '10:00', title: 'Conscious Breathing', desc: 'Learn to use the breath as a tool to calm the mind.', wa: wa('Hi Shanti 🌿 I want to book the Conscious Breathing workshop.') },
      { day: '20', month: 'Sep', tag: 'Retreat', time: '2 days', title: 'Weekend Retreat', desc: 'Two days of yoga, nature and rest to return to yourself without rushing.', wa: wa('Hi Shanti 🌿 I want info about the Weekend Retreat.') }
    ];
    const c = es ? {
      kicker: 'Agenda', title: 'Próximos encuentros', sub: 'Reserva tu lugar entre las montañas de Imbabura.', reserve: 'Reservar',
      formKicker: 'Reserva', formTitle: 'Aparta tu lugar', formText: 'Cuéntanos qué experiencia te gustaría vivir y coordinamos todo por WhatsApp, de forma cercana y sin complicaciones.',
      fName: 'Tu nombre', phName: '¿Cómo te llamas?', fExp: 'Experiencia', fDate: 'Fecha', fPeople: 'Personas', fMsg: 'Mensaje', phMsg: 'Cuéntanos qué tienes en mente…', fSubmit: 'Reservar por WhatsApp',
      formNote: 'Se abrirá WhatsApp con tu mensaje listo para enviar.'
    } : {
      kicker: 'Calendar', title: 'Upcoming gatherings', sub: 'Reserve your place among the mountains of Imbabura.', reserve: 'Book',
      formKicker: 'Booking', formTitle: 'Save your spot', formText: 'Tell us which experience you would like to live and we will arrange everything on WhatsApp, warmly and with no fuss.',
      fName: 'Your name', phName: 'What is your name?', fExp: 'Experience', fDate: 'Date', fPeople: 'People', fMsg: 'Message', phMsg: 'Tell us what you have in mind…', fSubmit: 'Book on WhatsApp',
      formNote: 'WhatsApp will open with your message ready to send.'
    };
    const expOptions = es
      ? ['Yoga', 'Yoga + Brunch', 'Talleres para mujeres', 'Ceremonias', 'Cumpleaños', 'Alquiler de espacio', 'Otro']
      : ['Yoga', 'Yoga + Brunch', "Women's workshops", 'Ceremonies', 'Birthdays', 'Venue rental', 'Other'];
    return {
      c, events, expOptions, form: this.state.form,
      onName: (e) => this.set('name', e.target.value),
      onExp: (e) => this.set('exp', e.target.value),
      onDate: (e) => this.set('date', e.target.value),
      onPeople: (e) => this.set('people', e.target.value),
      onMsg: (e) => this.set('msg', e.target.value),
      submit: this.submit
    };
  }
}
</script>
</body>
</html>
