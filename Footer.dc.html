<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</helmet>
<footer style="background:#24504D;color:#dfe9e5;font-family:'Jost',sans-serif;position:relative;overflow:hidden">
  <svg viewBox="0 0 200 120" width="360" height="216" style="position:absolute;right:-40px;top:-30px;opacity:.06;color:#fff" fill="none" stroke="currentColor" stroke-width="1">
    <path d="M100 110 C100 70 80 55 60 50 C82 46 100 30 100 10 C100 30 118 46 140 50 C120 55 100 70 100 110Z"/>
    <path d="M100 110 C100 80 116 66 150 70"/><path d="M100 110 C100 80 84 66 50 70"/>
  </svg>
  <div style="max-width:1200px;margin:0 auto;padding:72px clamp(22px,6vw,64px) 40px;display:grid;grid-template-columns:1.5fr 1fr 1.4fr;gap:48px" data-footer-grid>
    <div>
      <div style="display:flex;align-items:center;gap:13px;margin-bottom:20px">
        <img src="uploads/logo-shanti.png" alt="Shanti" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.18)">
        <span style="font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.16em;color:#fff">SHANTI</span>
      </div>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;line-height:1.5;color:#eef4f1;max-width:300px;margin:0 0 8px">{{ tagline }}</p>
      <p style="font-size:12.5px;letter-spacing:.04em;color:#a9c2bc;line-height:1.7;margin:0;max-width:300px">{{ blurb }}</p>
    </div>
    <div>
      <h4 style="font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#8fb3ac;margin:0 0 20px;font-weight:500">{{ exploreLabel }}</h4>
      <div style="display:flex;flex-direction:column;gap:13px">
        <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
          <a href="{{ link.href }}" style="text-decoration:none;color:#dfe9e5;font-size:14px;letter-spacing:.02em" style-hover="color:#fff">{{ link.label }}</a>
        </sc-for>
      </div>
    </div>
    <div>
      <h4 style="font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#8fb3ac;margin:0 0 20px;font-weight:500">{{ contactLabel }}</h4>
      <div style="display:flex;flex-direction:column;gap:16px;font-size:13.5px;line-height:1.6;color:#cfe0db">
        <div style="display:flex;gap:11px;align-items:flex-start">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#c9a9a1" stroke-width="1.4" style="margin-top:2px;flex-shrink:0"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
          <span>Lulunqui, detrás del bosque protector<br>Loma de Guayabillas · Ibarra, Ecuador</span>
        </div>
        <a href="https://wa.me/593988706699" target="_blank" rel="noopener" style="display:flex;gap:11px;align-items:center;text-decoration:none;color:#cfe0db" style-hover="color:#fff">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#c9a9a1" stroke-width="1.4" style="flex-shrink:0"><path d="M4 5c0 8.3 6.7 15 15 15a2 2 0 0 0 2-2v-2.5a1 1 0 0 0-.8-1l-3.3-.7a1 1 0 0 0-1 .4l-.8 1a12 12 0 0 1-5-5l1-.8a1 1 0 0 0 .4-1L10 5.8A1 1 0 0 0 9 5H6.5A2 2 0 0 0 4 5Z"/></svg>
          098 870 6699
        </a>
        <a href="mailto:info@shantiibarra.com" style="display:flex;gap:11px;align-items:center;text-decoration:none;color:#cfe0db" style-hover="color:#fff">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#c9a9a1" stroke-width="1.4" style="flex-shrink:0"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>
          info@shantiibarra.com
        </a>
        <a href="https://instagram.com/shanti.ibarra" target="_blank" rel="noopener" style="display:flex;gap:11px;align-items:center;text-decoration:none;color:#cfe0db" style-hover="color:#fff">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#c9a9a1" stroke-width="1.4" style="flex-shrink:0"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#c9a9a1" stroke="none"/></svg>
          @shanti.ibarra
        </a>
      </div>
    </div>
  </div>
  <div style="border-top:1px solid rgba(255,255,255,.1);padding:22px clamp(22px,6vw,64px);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11.5px;letter-spacing:.06em;color:#8fb3ac;max-width:1200px;margin:0 auto">
    <span>© 2026 Shanti Ibarra · Ibarra, Ecuador</span>
    <span>{{ rightsLabel }}</span>
  </div>
</footer>

<a href="{{ waHref }}" target="_blank" rel="noopener" aria-label="WhatsApp" style="position:fixed;right:22px;bottom:22px;z-index:1200;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 26px rgba(37,211,102,.42);color:#fff;text-decoration:none;transition:transform .25s ease" style-hover="transform:scale(1.08)">
  <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.8-2-.9-.3-.1-.5-.2-.6.2-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-1.6-.8-2.7-1.5-3.7-3.3-.3-.5.3-.5.8-1.5.1-.2 0-.3 0-.5 0-.1-.6-1.5-.8-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 .9-1 2.3s1 2.7 1.2 2.9c.1.2 2 3.1 4.9 4.3 1.8.8 2.5.8 3.4.7.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.4 1.3 4.9L2 22l5.3-1.4c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.3c-1.5 0-3-.4-4.2-1.2l-.3-.2-3.1.8.8-3-.2-.3C4 15.2 3.6 13.6 3.6 12 3.6 7.4 7.4 3.7 12 3.7c4.6 0 8.3 3.7 8.3 8.3S16.6 20.3 12 20.3z"/></svg>
</a>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:420}}">
class Component extends DCLogic {
  componentDidMount() {
    this.applyResponsive();
    this._onResize = () => this.applyResponsive();
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }
  applyResponsive() {
    const g = document.querySelector('[data-footer-grid]');
    if (g) g.style.gridTemplateColumns = window.innerWidth < 760 ? '1fr' : '1.5fr 1fr 1.4fr';
  }
  renderVals() {
    const lang = (typeof localStorage !== 'undefined' && localStorage.getItem('shanti_lang')) || 'es';
    const labels = {
      es: ['Inicio', 'Nuestra Historia', 'Experiencias', 'Eventos', 'Galería', 'Contacto'],
      en: ['Home', 'Our Story', 'Experiences', 'Events', 'Gallery', 'Contact']
    }[lang];
    const hrefs = ['index.dc.html', 'historia.dc.html', 'experiencias.dc.html', 'eventos.dc.html', 'galeria.dc.html', 'contacto.dc.html'];
    return {
      links: labels.map((label, i) => ({ label, href: hrefs[i] })),
      tagline: lang === 'es' ? 'Bienestar para cuerpo, mente y alma.' : 'Wellness for body, mind and soul.',
      blurb: lang === 'es'
        ? 'Un espacio en las montañas de Ibarra para volver a ti, a tu ritmo.'
        : 'A space in the mountains of Ibarra to return to yourself, at your own pace.',
      exploreLabel: lang === 'es' ? 'Explorar' : 'Explore',
      contactLabel: lang === 'es' ? 'Contacto' : 'Contact',
      rightsLabel: lang === 'es' ? 'Yoga · Brunch · Talleres · Ceremonias' : 'Yoga · Brunch · Workshops · Ceremonies',
      waHref: 'https://wa.me/593988706699?text=' + encodeURIComponent(lang === 'es' ? 'Hola Shanti, quiero reservar 🌿' : 'Hi Shanti, I would like to book 🌿')
    };
  }
}
</script>
</body>
</html>
